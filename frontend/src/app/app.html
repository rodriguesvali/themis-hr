<div class="flex flex-col h-screen w-full bg-surface-50">
    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-white shadow-sm border-b border-surface-200">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold text-surface-900 m-0">Themis HR</h1>
            <span class="bg-primary-100 text-primary-700 text-xs px-2 py-1 rounded-md ml-2 font-semibold">Beta</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-primary-500 text-white flex items-center justify-center font-bold">U</div>
        </div>
    </header>

    <!-- Main Content (Chat Area) -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 flex justify-center">
        <div class="w-full max-w-4xl flex flex-col gap-4">
            
            <!-- Welcome Message (Fixo) -->
            <div class="flex flex-col items-start gap-2">
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-surface-200 max-w-[80%]">
                    <p class="m-0 text-surface-800 leading-relaxed">
                        Olá! Eu sou a <strong>Themis</strong>, sua assistente inteligente de Recursos Humanos. 
                        Como posso ajudar você hoje? (Ex: Como pedir férias? Qual a política de home office?)
                    </p>
                </div>
                <span class="text-xs text-surface-500 ml-2">Themis Agent</span>
            </div>

            <!-- Loop Mapeado nos Signals do Service -->
            <div *ngFor="let msg of chatService.messages()" [ngClass]="msg.role === 'user' ? 'items-end' : 'items-start'" class="flex flex-col gap-2">
                <div [ngClass]="msg.role === 'user' ? 'bg-primary-500 rounded-tr-none' : 'bg-white border border-surface-200 rounded-tl-none'" class="p-4 rounded-2xl shadow-sm max-w-[80%]">
                    <p [ngClass]="msg.role === 'user' ? 'text-white' : 'text-surface-800'" class="m-0 leading-relaxed">
                        {{ msg.content }}
                    </p>
                </div>
                <span [ngClass]="msg.role === 'user' ? 'mr-2' : 'ml-2'" class="text-xs text-surface-500">
                    {{ msg.role === 'user' ? 'Você' : 'Themis Agent' }}
                </span>
            </div>

            <!-- Typing Indicator -->
            <div *ngIf="chatService.isTyping()" class="flex flex-col items-start gap-2">
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-surface-200 max-w-[80%] flex gap-2 items-center">
                    <span class="text-surface-600 text-sm italic">Themis está digitando...</span>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Input -->
    <footer class="p-4 bg-white border-t border-surface-200 flex justify-center">
        <div class="w-full max-w-4xl flex gap-2 items-center">
            <input 
                type="text" 
                [(ngModel)]="userInput" 
                (keyup.enter)="sendMessage()"
                placeholder="Digite sua dúvida de RH aqui..." 
                class="w-full p-3 border border-surface-300 rounded-md focus:border-primary-500 outline-none" />
            <button 
                (click)="sendMessage()" 
                [disabled]="!userInput.trim() || chatService.isTyping()"
                class="bg-primary-500 text-white px-6 py-3 rounded-md font-bold hover:bg-primary-600 cursor-pointer disabled:opacity-50 transition-colors">
                Enviar
            </button>
        </div>
    </footer>
</div>
