services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace/themis-hr:cached
    working_dir: /workspace/themis-hr
    command: sleep infinity
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: themis_hr
      POSTGRES_USER: themis
      POSTGRES_PASSWORD: themis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U themis -d themis_hr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
