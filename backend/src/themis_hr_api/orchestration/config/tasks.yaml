# Referência documental do fluxo atual.
# A orquestração condicional é montada em Python em orchestration/crew.py para evitar
# que todos os especialistas sejam executados em sequência.

routing_task:
  agent: principal_agent
  description: >
    Classificar a mensagem do colaborador, escolher uma área de conhecimento e indicar sensibilidade.
  expected_output: >
    JSON com area_key, category, sensitivity e reason.

specialist_task:
  agent: especialista_escolhido
  description: >
    Executada apenas para a área escolhida pelo principal_agent. O especialista recebe a pergunta,
    a classificação e somente a base de conhecimento da sua área.
  expected_output: >
    JSON com answer, confidence, should_escalate e escalation_reason.

direct_escalation:
  agent: principal_agent
  description: >
    Casos classificados como alta sensibilidade ou assuntos gerais são escalados sem chamar especialista.
  expected_output: >
    Resposta de handoff humano e motivo de escalonamento.
